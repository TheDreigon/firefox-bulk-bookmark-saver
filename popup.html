<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      margin: 0;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
    }
    
    h3 {
      margin: 0 0 12px 0;
      font-size: 14px;
      font-weight: 600;
    }
    
    .folder-select-section {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 12px;
      color: #333;
    }
    
    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      background: white;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 15px;
    }
    
    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    
    .save-button {
      background: #0060df;
      color: white;
    }
    
    .save-button:hover {
      background: #003eaa;
    }
    
    .cancel-button {
      background: #f0f0f0;
      color: #333;
    }
    
    .cancel-button:hover {
      background: #e0e0e0;
    }
    
    .create-folder-button {
      width: 100%;
      padding: 6px 10px;
      margin-top: 8px;
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      color: #333;
    }
    
    .create-folder-button:hover {
      background: #e0e0e0;
    }
    
    .option-group {
      margin: 12px 0;
    }
    
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: #f9f9f9;
      border-radius: 4px;
    }
    
    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      cursor: pointer;
      flex-shrink: 0;
    }
    
    .checkbox-group label {
      cursor: pointer;
      user-select: none;
      line-height: 1.3;
    }
    
    .quick-action {
      padding: 10px 12px;
      margin-bottom: 8px;
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .quick-action:hover {
      background: #e8e8e8;
    }
    
    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 12px 0;
    }
  </style>
</head>
<body>
  <h3>Choose where to save bookmarks:</h3>
  
  <div class="folder-select-section">
    <label for="folderSelect">Save to:</label>
    <select id="folderSelect" size="8">
      <option value="">Loading...</option>
    </select>
    <button class="create-folder-button" id="createFolderButton">+ Create New Folder</button>
  </div>
  
  <div class="option-group">
    <div class="checkbox-group">
      <input type="checkbox" id="closeWindowCheckbox">
      <label for="closeWindowCheckbox" style="margin: 0; font-size: 12px;">Close window after saving current tabs</label>
    </div>
  </div>
  
  <div class="button-group">
    <button class="save-button" id="saveButton">Save & Close Window</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
